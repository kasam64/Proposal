<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Be My Girlfriend?</title>
<style>
    body {
        font-family: 'Comic Sans MS', cursive, sans-serif;
        background: #ffe6f0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        margin: 0;
    }

    h1 {
        font-size: 2.5em;
        color: #ff3399;
        margin-bottom: 50px;
        text-align: center;
    }

    #yes {
        font-size: 1.5em;
        padding: 15px 40px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        background-color: #ff66b2;
        color: white;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        transition: all 0.3s ease;
        position: relative; /* stay centered */
        z-index: 1;
    }

    #no {
        font-size: 1.5em;
        padding: 15px 40px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        background-color: #ffcccc;
        color: #990000;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        transition: all 0.2s ease;
        position: absolute; /* dodge freely */
    }

    .emoji {
        font-size: 2.5em;
        margin: 10px;
        animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-15px); }
        100% { transform: translateY(0px); }
    }

    #message {
        font-size: 2em;
        color: #ff3399;
        margin-top: 30px;
        display: none;
        text-align: center;
        max-width: 90%;
    }

</style>
</head>
<body>
    <h1>Will You Be My Girlfriend?</h1>

    <button id="yes">Yes 💖</button>
    <button id="no">No 😅</button>

    <!-- Floating emojis -->
    <div>
        <span class="emoji">❤️</span>
        <span class="emoji">💌</span>
        <span class="emoji">😍</span>
        <span class="emoji">🥰</span>
        <span class="emoji">💫</span>
    </div>

    <div id="message">Yay! 💖 I’m so happy! Can’t wait for all the adventures with you! 😍🥰</div>

    <script>
        const noBtn = document.getElementById('no');
        const yesBtn = document.getElementById('yes');
        const message = document.getElementById('message');

        // Place the No button initially near the Yes button
        noBtn.style.left = (window.innerWidth / 2 + 150) + 'px';
        noBtn.style.top = (window.innerHeight / 2 - 25) + 'px';

        // Dodge effect
        noBtn.addEventListener('mouseover', () => {
            const bodyWidth = window.innerWidth - noBtn.offsetWidth;
            const bodyHeight = window.innerHeight - noBtn.offsetHeight;

            const randomX = Math.floor(Math.random() * bodyWidth);
            const randomY = Math.floor(Math.random() * bodyHeight);

            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        });

        // Yes click
        yesBtn.addEventListener('click', () => {
            message.style.display = 'block';
            message.scrollIntoView({behavior: "smooth"});
            console.log("User clicked YES! 💖");
        });
    </script>
</body>
</html>
